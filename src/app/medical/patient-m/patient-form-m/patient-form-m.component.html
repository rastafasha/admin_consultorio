<div class="page-wrapper">
    <div class="content">

        <!-- Page Header -->
        <div class="page-header">
            <div class="row">
                <app-back-bottn style="width: 50px;"></app-back-bottn>
                <div class="col-sm-10">
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a [routerLink]="['/patients/list/doctor/', doctor_id]">Pacientes
                            </a></li>
                        <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
                        <li class="breadcrumb-item active">{{ title }} </li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- /Page Header -->
        <app-loading *ngIf="isLoading"></app-loading>
        <div class="row" *ngIf="!isLoading">
            <form [formGroup]="patientForm">
                <!-- paciente -->
                <div class="col-sm-12">
                    <div class="card">
                        <div class="card-body">
                            <button class="btn btn-outline-primary btn-sm rounded-circle shadow-sm"
                                (click)="modalCrearPaciente.open()" title="Ayuda de la sección">
                                <i class="fas fa-question"></i>
                            </button>

                            <div class="row">
                                <div class="col-12">
                                    <div class="form-heading">
                                        <h4>Paciente Detalle {{ isEditMode ? '#'+patientId : '' }}</h4>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label>N.Documento <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="n_doc" type="text"
                                            (blur)="verificarPaciente($event)" required>
                                        <!-- Contenedor único de validaciones -->
                                        <div *ngIf="patientForm.get('n_doc')?.touched || patientForm.get('n_doc')?.dirty"
                                            class="text-danger mt-1 small">
                                            <div *ngIf="patientForm.get('n_doc')?.errors?.['required']">
                                                * Campo Requerido
                                            </div>
                                            <div *ngIf="patientForm.get('n_doc')?.errors?.['minlength']">
                                                * Mínimo 3 Caracteres
                                            </div>
                                            <!-- Esta es la línea que debe activarse cuando el backend devuelva true -->
                                            <small *ngIf="pacienteExiste" class="text-danger mt-1 d-block small">
                                                * Este número de documento ya está registrado.
                                            </small>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label>Nombre <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="name" type="text" required>
                                        <div *ngIf="patientForm.get('name')?.touched" class="text-danger">
                                            <div *ngIf="patientForm.get('name')?.errors?.['required']">
                                                Campo Requerido
                                            </div>
                                            <div *ngIf="patientForm.get('name')?.errors?.['minlength']">
                                                Mínimo 3 Caracteres
                                            </div>
                                        </div>
                                    </div>

                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label>Apellido <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="surname" type="text" required>
                                        <div *ngIf="patientForm.get('surname')?.touched" class="text-danger">
                                            <div *ngIf="patientForm.get('surname')?.errors?.['required']">
                                                Campo Requerido
                                            </div>
                                            <div *ngIf="patientForm.get('surname')?.errors?.['minlength']">
                                                Mínimo 3 Caracteres
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label>Teléfono Whatsapp <span class="login-danger">*</span></label>
                                        <input class="form-control" formControlName="phone" type="text" required>
                                        <div *ngIf="patientForm.get('phone')?.touched" class="text-danger">
                                            <div *ngIf="patientForm.get('phone')?.errors?.['required']">
                                                Campo Requerido
                                            </div>
                                            <div *ngIf="patientForm.get('phone')?.errors?.['minlength']">
                                                Mínimo 3 Caracteres
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label>Email</label>
                                        <input class="form-control" formControlName="email" type="email">
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group local-forms">
                                        <label>Fecha de Nacimiento</label>
                                        <input class="form-control datetimepicker" formControlName="birth_date"
                                            type="date">
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4">
                                    <div class="form-group select-gender">
                                        <label class="gen-label">Sexo<span class="login-danger">*</span></label>
                                        <div class="form-check-inline">
                                            <label class="form-check-label">
                                                <input type="radio" formControlName="gender" value="1"
                                                    class="form-check-input">Masculino
                                            </label>
                                        </div>
                                        <div class="form-check-inline">
                                            <label class="form-check-label">
                                                <input type="radio" formControlName="gender" value="2"
                                                    class="form-check-input">Femenino
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4"
                                    *ngIf="doctor && doctor.speciality?.name !== 'Pediatría'">
                                    <div class="form-group local-forms">
                                        <label>Profesión</label>
                                        <input class="form-control" formControlName="education" type="text">
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4"
                                    *ngIf="doctor && doctor.speciality?.name === 'Pediatría'">
                                    <div class="form-group local-forms">
                                        <label>Peso al nacer</label>
                                        <input class="form-control" formControlName="peso_al_nacer" type="number">
                                    </div>
                                </div>
                                <div class="col-12 col-sm-6 col-md-6 col-xl-4"
                                    *ngIf="doctor && doctor.speciality?.name === 'Pediatría'">
                                    <div class="form-group local-forms">
                                        <label>Talla al nacer</label>
                                        <input class="form-control" formControlName="talla_al_nacer" type="number">
                                    </div>
                                </div>

                                <div class="col-12 col-sm-12">
                                    <div class="form-group local-forms">
                                        <label>Dirección</label>
                                        <textarea class="form-control" formControlName="address" rows="3"
                                            cols="30"></textarea>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6 col-md-6 col-xl-6">
                                    <div class="form-group local-top-form">
                                        <label class="local-top">Foto</label>
                                        <div class="settings-btn upload-files-avator">
                                            <input type="file" accept="image/*" id="file" (change)="loadFile($event)"
                                                class="hide-input">
                                            <label for="file" class="upload">Seleccione Foto</label>
                                        </div>
                                    </div>
                                    <img *ngIf="IMAGE_PREVISUALIZA" [src]="IMAGE_PREVISUALIZA" style="width: 250px;"
                                        alt="">
                                </div>

                            </div>


                        </div>
                    </div>

                </div>
                <!-- fin paciente -->
                <!-- acompañante -->
                <app-acompanantes [patientForm]="patientForm"></app-acompanantes>
                <!-- motivo Consulta -->
                 <app-motivo-consulta [patientForm]="patientForm"></app-motivo-consulta>

                <!-- antecedentes -->
                <app-antecedentes [patientForm]="patientForm"></app-antecedentes>
                <!-- fin antecedentes -->
                <app-enfermedad-actual [patientForm]="patientForm"></app-enfermedad-actual>
                <!-- Historial enfermedad -->
                <app-historial-enfermedad [patientForm]="patientForm"></app-historial-enfermedad>
                <!-- signos vitales -->
                <app-signos-vitales [patientForm]="patientForm"></app-signos-vitales>
                <!-- fin signos vitales -->
                <!-- Vacunas -->
                <app-vacunas #componenteVacunas [patientForm]="patientForm" [doctor]="doctor"></app-vacunas>
                <!-- Examen fisico -->
                <app-examen-fisico [patientForm]="patientForm"></app-examen-fisico>
                <!-- Reporte Laboratorio -->
                <app-reporte-laboratorio [patient_selected]="patient_selected" [patientForm]="patientForm"></app-reporte-laboratorio>
                <!-- Diagnostico -->
                <app-diagnostico [patientForm]="patientForm"></app-diagnostico>
                <!-- tratamiento -->
                <app-tratamiento [patientForm]="patientForm"></app-tratamiento>
                <!-- Evolucion -->
                <app-evolucion #componenteEvolucion [patientForm]="patientForm"></app-evolucion>

                <div class="col-12 mt-3">
                    <div class="doctor-submit text-end">
                        <button type="button" [disabled]="isLoading || isSaving"
                            class="btn btn-primary submit-form me-2" (click)="save()">
                            <span *ngIf="isLoading || isSaving">Guardando...</span>
                            <span *ngIf="!isLoading && !isSaving">Guardar</span>
                        </button>
                    </div>
                </div>

            </form>

        </div>
    </div>
</div>

<app-modal-instrucciones [info]="info_form_paciente" sectionId="crear_editar_paciente"
    #modalCrearPaciente></app-modal-instrucciones>
