<div class="col-sm-12" *ngIf="doctor && doctor.speciality?.name === 'Pediatría'">
            <div class="card">
                <div class="card-body">
            <div class="row">
                <div class="col-12">
                    <div class="form-heading">
                        <h4>Vacunas</h4>
                    </div>
                </div>
                <div class="row align-items-center">
                    <div class="col-xs-12">
                        <div class="row">
                            <div class="col-12 col-sm-12 col-md-6">
                                <div class="form-group local-forms">
                                    <label>Item<span class="login-danger">*</span></label>
                                    <input class="form-control" name="name_medical" [(ngModel)]="name_medical"
                                        type="text">
                                </div>
                            </div>
                            <div class="col-12 col-sm-4 col-md-2">
                                <div class="form-group local-forms">
                                    <label>Fecha<span class="login-danger">*</span></label>
                                    <input class="form-control" name="fecha_vacuna" [(ngModel)]="fecha_vacuna"
                                        type="date">
                                </div>
                            </div>
                            <div class="col-12 col-sm-4 col-md-2">
                                <div class="form-group local-forms">
                                    <label>Cantidad<span class="login-danger">*</span></label>
                                    <input class="form-control" name="cantidad" [(ngModel)]="cantidad" type="number">
                                </div>
                            </div>
                            <div class="col-12 col-sm-4 col-md-2">
                                <button type="button" class="btn btn-primary btn-sm w-100" (click)="addVacuna()">+
                                    Agregar</button>
                            </div>
                        </div>
                    </div>

                    <!-- TABLA DE LISTADO -->
                    <div class="col-xs-12 mt-3">
                        <div class="table-responsive">
                            <table class="table mb-0 table-striped">
                                <thead>
                                    <tr>
                                        <th>Descripción</th>
                                        <th>Cantidad</th>
                                        <th>Fecha</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let item of mvacunas; let i = index">
                                        <td>{{ item.name_medical }}</td>
                                        <td>{{ item.cantidad }}</td>
                                        <td>{{ item.fecha_vacuna | date:'dd/MM/yyyy' }}</td>
                                        <td>
                                            <button type="button" class="btn btn-danger btn-sm"
                                                (click)="deleteVacuna(i)">x</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
